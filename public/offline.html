<!DOCTYPE html>
<html lang="so">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a1628" />
  <title>AC7 Group — Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: linear-gradient(-45deg, #070f1f, #0a1628, #0f2744, #1a365d);
      background-size: 400% 400%;
      animation: flow 18s ease infinite;
      color: #ffffff;
      padding: 24px;
      text-align: center;
    }
    @keyframes flow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .card {
      max-width: 360px;
      background: #ffffff;
      color: #111111;
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(0, 0, 0, 0.08);
    }
    h1 { color: #111111; font-size: 1.5rem; margin: 0 0 12px; }
    p { color: rgba(0, 0, 0, 0.58); line-height: 1.5; margin: 0 0 20px; }
    button {
      background: #0f2744;
      color: #ffffff;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <h1>AC7 Group</h1>
    <p>Internet-ka ma jiro. Fadlan hubi xiriirkaaga kadibna isku day mar kale.</p>
    <button onclick="location.reload()">Isku day mar kale</button>
  </div>
</body>
</html>
