<!DOCTYPE html>
<html lang="so">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#030337" />
  <title>AC7 Group — Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: #030337;
      color: #ffffff;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 360px;
      background: #f7f2ea;
      color: #0f172a;
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      border: 1px solid #e0d6c8;
    }
    h1 { color: #030337; font-size: 1.5rem; margin: 0 0 12px; }
    p { color: #475569; line-height: 1.5; margin: 0 0 20px; }
    button {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #1a4fd6; }
  </style>
</head>
<body>
  <div class="card">
    <h1>AC7 Group</h1>
    <p>Internet-ka ma jiro. Fadlan hubi xiriirkaaga kadibna isku day mar kale.</p>
    <button onclick="location.reload()">Isku day mar kale</button>
  </div>
</body>
</html>
